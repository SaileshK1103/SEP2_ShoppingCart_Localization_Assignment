version: "3.9"

services:
  app:
    image: saileshk1103/sep2_shoppingcart_localization_assignment:latest
    container_name: shopping-cart-app
    ports:
      - "9000:8080"
    environment:
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - DISPLAY=host.docker.internal:0.0
    restart: on-failure