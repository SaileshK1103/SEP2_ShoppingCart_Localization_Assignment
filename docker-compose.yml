version: "3.9"

services:
  db:
    image: mariadb:10.6
    container_name: shopping-cart-db
    environment:
      - MARIADB_ROOT_PASSWORD=admin
      - MARIADB_DATABASE=shopping_cart_localization
      - MARIADB_USER=Sailesh
      - MARIADB_PASSWORD=admin
    ports:
      - "3306:3306"
    restart: always

  app:
    image: saileshk1103/sep2_shoppingcart_localization_assignment:latest
    container_name: shopping-cart-app
    depends_on:
      - db
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=host.docker.internal:0
      - DB_URL=jdbc:mysql://db:3306/shopping_cart_localization?useUnicode=true&characterEncoding=UTF-8
      - DB_USER=Sailesh
      - DB_PASSWORD=admin
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - JAVA_TOOL_OPTIONS=-Dprism.order=sw -Djava.awt.headless=false -Dfile.encoding=UTF-8
    restart: on-failure