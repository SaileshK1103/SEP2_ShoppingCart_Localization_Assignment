version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: shopping_cart_db
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MYSQL_TCP_PORT: "3307"
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD} # Using your pass for root too
    ports:
      - "3307:3307"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    image: saileshk1103/sep2_shoppingcart_localization_assignment:latest
    container_name: shopping_cart_app
    depends_on:
      - db
    environment:
      - DB_HOST=db                          
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "8080:8080"