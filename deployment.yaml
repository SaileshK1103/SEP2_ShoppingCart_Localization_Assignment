apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-cart-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopping-cart
  template:
    metadata:
      labels:
        app: shopping-cart
    spec:
      containers:
        - name: shopping-cart
          image: saileshk1103/sep2_shoppingcart_localization_assignment:latest
          imagePullPolicy: Always
          env:
            - name: DISPLAY
              value: "host.docker.internal:0"
            - name: LANG
              value: "en_US.UTF-8"
            - name: JAVA_TOOL_OPTIONS
              # CRITICAL: headless=false so it tries to open the window
              value: "-Djava.awt.headless=false -Dprism.order=sw"
---
apiVersion: v1
kind: Service
metadata:
  name: shopping-cart-service
spec:
  type: NodePort
  selector:
    app: shopping-cart
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30007